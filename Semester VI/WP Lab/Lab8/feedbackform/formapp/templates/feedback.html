<!DOCTYPE html>
<html>
<head>
    <title>Courseware Feedback Form</title>
</head>
<body>
    <h2>Courseware Feedback Form</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Submit Form</button>
    </form>

    {% if message %}
        <p>{{ message }}</p>
    {% endif %}
</body>
</html>
